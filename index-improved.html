<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lend Application - Improved</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Welcome to the Improved Lend Application</h1>
    </header>
    <main>
        <section>
            <h2>Loan Options</h2>
            <form id="loan-form">
                <label for="amount">Loan Amount:</label>
                <input type="number" id="amount" name="amount" required min="1000" max="50000" step="1000">
                <label for="term">Loan Term:</label>
                <select id="term" name="term" required>
                    <option value="6">6 months</option>
                    <option value="12">12 months</option>
                    <option value="24">24 months</option>
                </select>
                <button type="submit">Calculate</button>
            </form>
        </section>
        <section id="results">
            <h2>Calculation Results</h2>
            <div id="output"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Improved Lend Application. All Rights Reserved.</p>
    </footer>
    <script>
        document.getElementById('loan-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const amount = parseFloat(document.getElementById('amount').value);
            const term = parseInt(document.getElementById('term').value);
            if (isNaN(amount) || isNaN(term)) {
                alert('Invalid input. Please enter valid numeric values.');
                return;
            }
            const result = calculateLoan(amount, term);
            document.getElementById('output').innerText = `Monthly Payment: $${result.toFixed(2)}`;
        });

        function calculateLoan(amount, term) {
            const interestRate = 0.05; // Example interest rate
            const monthlyRate = interestRate / 12;
            const monthlyPayment = (amount * monthlyRate) / (1 - Math.pow(1 + monthlyRate, -term));
            return monthlyPayment;
        }
    </script>
</body>
</html>
