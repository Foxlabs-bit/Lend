<html lang="en">

    <script>
        // Initialize Supabase
        const supabaseUrl = 'https://your-supabase-url'; // Replace with your Supabase URL
        const supabaseKey = process.env.SUPABASE_KEY; // Using environment variable for API key
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function fetchData() {
            try {
                const { data, error } = await supabase.from('table_name').select('*');
                if (error) throw new Error('Error fetching data: ' + error.message);
                // Process data
            } catch (error) {
                console.error(error);
                // Handle error appropriately
            }
        }

        // Example of regex escape fix
        const regex = new RegExp(escapeStringForRegExp(cookieStorageKey));  // Utility function for escaping regex

        function escapeStringForRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\/]/g, '\\$&');
        }

        function validateInput(userInput) {
            if (typeof userInput !== 'string' || userInput.trim() === '') {
                throw new Error('Invalid input');
            }
            // Further input validation can be added here
        }

        function handleUserInput(input) {
            validateInput(input);
            const safeInput = escapeHtml(input);
            document.getElementById('output').innerText = safeInput; // Prevent XSS
        }

        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
    </script>

<body>

    <div id="output"></div>
</body>
